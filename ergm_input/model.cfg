; EstimNetDirected 設定ファイル（意匠分類ノード属性版）
; 生成元: build_ergm_input.py
;
; 意匠分類 D1–D99 をノード属性として扱い、
; クラス間 Homophily・Sender/Receiver 効果を推定する。
; 論文の IPC Subclass 相当 = 意匠分類 D-class (D1–D99)

ArcListFile       = arc_list.txt
AttributesFile    = attributes.txt
PairAttributeFile = class_sim_jaccard.npy

; === 構造統計量 ===
Param_AltInStar     = 1    ; GWIDegree（被共引用多様性）
Param_AltOutStar    = 1    ; GWODegree（共引用先多様性）
Param_AltKTriangleT = 2    ; GWESP 推移性
Param_AltTwoPathsTD = 1    ; GWDSP

; === D-class Sender/Receiver 効果（2 行に分割）===
; 「クラス X の特許は共引用されやすいか / 多く共引用するか」
ReceiverEffect = IsClass_D1 IsClass_D2 IsClass_D3 IsClass_D4 IsClass_D5 IsClass_D6 IsClass_D7 IsClass_D8 IsClass_D9 IsClass_D10 IsClass_D11 IsClass_D12 IsClass_D13 IsClass_D14 IsClass_D15 IsClass_D16 IsClass_D17
ReceiverEffect = IsClass_D18 IsClass_D19 IsClass_D20 IsClass_D21 IsClass_D22 IsClass_D23 IsClass_D24 IsClass_D25 IsClass_D26 IsClass_D27 IsClass_D28 IsClass_D29 IsClass_D30 IsClass_D31 IsClass_D32 IsClass_D33 IsClass_D34 IsClass_D99
SenderEffect   = IsClass_D1 IsClass_D2 IsClass_D3 IsClass_D4 IsClass_D5 IsClass_D6 IsClass_D7 IsClass_D8 IsClass_D9 IsClass_D10 IsClass_D11 IsClass_D12 IsClass_D13 IsClass_D14 IsClass_D15 IsClass_D16 IsClass_D17
SenderEffect   = IsClass_D18 IsClass_D19 IsClass_D20 IsClass_D21 IsClass_D22 IsClass_D23 IsClass_D24 IsClass_D25 IsClass_D26 IsClass_D27 IsClass_D28 IsClass_D29 IsClass_D30 IsClass_D31 IsClass_D32 IsClass_D33 IsClass_D34 IsClass_D99

; === D-class 多様性スコア（連続変量）===
ReceiverEffect = n_classes
SenderEffect   = n_classes

; === D-class Homophily ===
; バイナリ: 同一メインクラス間（論文の OverlappingCategorization 相当）
Homophily      = primary_class
; 連続値: 全クラス Jaccard 類似度（拡張版）
PairAttribute  = class_sim_jaccard.npy
; または バイナリ行列を使う場合:
; PairAttribute  = class_sim_binary.npy
